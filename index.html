<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Asset Manager Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h1 class="fw-bold tracking-tight">Inventory <span class="text-primary">Hub</span></h1>
                <p class="text-secondary mb-0">Manage and track IT assets in real-time.</p>
            </div>
            <div class="stats-pill">
                <span id="total-assets">0</span> Assets Tracked
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-4">
                <div class="glass-card p-4">
                    <h5 class="fw-bold mb-4"><i class="bi bi-plus-circle-fill me-2 text-primary"></i>Register Asset</h5>
                    <form id="asset-form">
                        <div class="mb-3">
                            <label class="form-label small fw-semibold text-uppercase">Device Name</label>
                            <input type="text" id="asset-name" class="form-control modern-input" placeholder="e.g. MacBook Pro M3" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-semibold text-uppercase">Category</label>
                            <select id="asset-category" class="form-select modern-input">
                                <option value="Laptop">Laptop</option>
                                <option value="Server">Server</option>
                                <option value="Network">Network</option>
                                <option value="Mobile">Mobile</option>
                            </select>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-semibold text-uppercase">Serial Number</label>
                            <input type="text" id="asset-sn" class="form-control modern-input" placeholder="S/N: 123-ABC" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">Add to Registry</button>
                    </form>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="glass-card p-4">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="input-group search-group me-3">
                            <span class="input-group-text border-0 bg-transparent"><i class="bi bi-search"></i></span>
                            <input type="text" id="search-bar" class="form-control border-0" placeholder="Filter assets...">
                        </div>
                        <button id="export-btn" class="btn btn-outline-success btn-sm fw-bold text-nowrap">
                            <i class="bi bi-file-earmark-spreadsheet me-1"></i> Export CSV
                        </button>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-borderless">
                            <thead>
                                <tr class="text-secondary small fw-bold text-uppercase">
                                    <th>Device Info</th>
                                    <th>Category</th>
                                    <th>Serial</th>
                                    <th class="text-end">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="asset-list"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="liveToast" class="toast align-items-center text-white border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toast-message"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
